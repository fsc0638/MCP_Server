version: '3.8'

services:
  mcp_server:
    build: .
    container_name: mcp_server_app
    restart: always
    ports:
      # Map the server's external port 6888 to the container's internal port 8000
      - "6888:8000"
    volumes:
      # Mount necessary files and directories to ensure no code changes are needed
      - ./.env:/app/.env
      - ./Agent_skills:/app/Agent_skills
      # Mount server code for live updates without rebuild
      - ./server:/app/server
      # Mount frontend for live UI updates without rebuild
      - ./frontend:/app/frontend
      # Persist uploaded knowledge files across container rebuilds
      - ./workspace:/app/workspace
      # Persist FAISS vector index (inside container it maps to /root/.mcp_faiss)
      - mcp_faiss_data:/root/.mcp_faiss
      # Persist conversation memory
      - ./memory:/app/memory
    environment:
      - TZ=Asia/Taipei

volumes:
  mcp_faiss_data:
