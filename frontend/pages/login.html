<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent K — 登入</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/themes.css" />
  <link rel="stylesheet" href="../assets/css/login.css" />
  <!-- Anti-FOUC: apply saved theme before first paint -->
  <script>(function(){var t=localStorage.getItem('kway_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>

  <!-- Top navigation bar -->
  <nav class="page-login-topbar" role="navigation" aria-label="頁面導覽">
    <a href="index.html" class="logo" aria-label="返回首頁" style="gap:8px;">
      <div class="logo-mark" style="width:28px;height:28px;border-radius:6px;" aria-hidden="true">
        <img src="../assets/images/kw_logo.png" width="28" height="28" alt="K WAY Logo" />
      </div>
      <div class="logo-text">
        <span class="brand">Agent K</span>
        <span class="sub">凱衛資訊</span>
      </div>
    </a>
    <div class="page-login-topbar-right">
      <div class="page-login-topbar-badge" aria-label="企業登入模式">
        <div class="page-login-topbar-badge-dot" aria-hidden="true"></div>
        企業登入
      </div>
    </div>
  </nav>

  <!-- Login root -->
  <main class="page-login" style="margin-top:52px;" data-analytics-region="login-page">
    <article class="glass-card page-login-card" aria-labelledby="loginTitle">

      <header class="page-login-header">
        <div class="page-login-logo-mark" aria-hidden="true">
          <img src="../assets/images/kw_logo.png" width="48" height="48" alt="K WAY Logo" />
        </div>
        <h1 id="loginTitle" class="page-login-title">歡迎回來</h1>
        <p class="page-login-subtitle">請輸入帳號資訊以登入 Agent K</p>
      </header>

      <form class="page-login-form" id="loginForm" novalidate aria-label="登入表單">

        <!-- Demo hint -->
        <div class="page-login-demo-hint" role="note" aria-label="示範帳號資訊">
          <div class="page-login-demo-hint-icon" aria-hidden="true">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <div class="page-login-demo-hint-text">
            示範帳號：<strong>user@kway.com.tw</strong><br/>
            示範密碼：<strong>demo1234</strong>
          </div>
        </div>

        <!-- Email field -->
        <div class="page-login-form-group">
          <label class="input-label" for="email">電子郵件</label>
          <div class="page-login-input-wrap">
            <svg class="page-login-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input
              type="email"
              id="email"
              class="input-field"
              placeholder="user@kway.com.tw"
              autocomplete="email"
              aria-required="true"
              aria-describedby="emailError"
            />
          </div>
          <span class="error-msg page-login-error-msg" id="emailError" role="alert">請輸入有效的電子郵件</span>
        </div>

        <!-- Password field -->
        <div class="page-login-form-group">
          <label class="input-label" for="password">密碼</label>
          <div class="page-login-input-wrap">
            <svg class="page-login-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              type="password"
              id="password"
              class="input-field"
              placeholder="請輸入密碼"
              autocomplete="current-password"
              aria-required="true"
              aria-describedby="passwordError"
            />
            <button type="button" class="page-login-input-toggle" id="togglePwd" aria-label="顯示/隱藏密碼">
              <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="error-msg page-login-error-msg" id="passwordError" role="alert">密碼長度至少需要 6 個字元</span>
        </div>

        <!-- Form options -->
        <div class="page-login-form-options">
          <label class="page-login-checkbox-wrap">
            <input type="checkbox" id="remember" checked aria-label="記住我的登入狀態" />
            <span>記住我</span>
          </label>
          <a href="#" class="page-login-forgot-link">忘記密碼？</a>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="btn btn-primary page-login-submit-btn"
          id="loginBtn"
          data-analytics-title="登入提交"
        >
          <span class="page-login-btn-text">登入 Agent K</span>
          <div class="page-login-btn-loader" aria-label="登入中…" aria-live="polite"></div>
        </button>

        <div class="page-login-divider" aria-hidden="true">或使用以下方式</div>

        <!-- Social login -->
        <div class="page-login-social-grid" role="group" aria-label="第三方登入">
          <button type="button" class="page-login-social-item" onclick="socialLogin('Google')" aria-label="使用 Google 登入">
            <svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button type="button" class="page-login-social-item" onclick="socialLogin('Microsoft')" aria-label="使用 Microsoft 登入">
            <svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><rect x="1" y="1" width="10" height="10" fill="#F25022"/><rect x="13" y="1" width="10" height="10" fill="#7FBA00"/><rect x="1" y="13" width="10" height="10" fill="#00A4EF"/><rect x="13" y="13" width="10" height="10" fill="#FFB900"/></svg>
            Microsoft
          </button>
        </div>

        <p class="page-login-register-text">還沒有帳號？<a href="#">聯絡系統管理員</a></p>
      </form>

    </article>
  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="status" aria-live="polite">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="toastIcon" aria-hidden="true">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <span id="toastMsg">登入成功</span>
  </div>

  <!-- 本機設定（含私密金鑰，詳見 config.example.js） -->
  <script src="../config.js"></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script src="../assets/js/script.js"></script>
  <script src="../assets/js/login.js"></script>
</body>
</html>
